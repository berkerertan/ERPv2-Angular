<div class="page-container">
    <div class="page-header">
        <div>
            <h1 class="page-title">Depolar</h1>
            <p class="page-subtitle">Depo bilgilerini yönetin</p>
        </div>
        <button class="btn btn-primary" (click)="openAddModal()"><span class="material-icons-outlined">add</span> Yeni
            Depo</button>
    </div>
    <div class="toolbar">
        <div class="toolbar-search"><span class="material-icons-outlined search-icon">search</span><input type="text"
                placeholder="Depo ara..." [(ngModel)]="searchTerm" /></div>
    </div>
    <div class="table-container">
        <table class="data-table">
            <thead>
                <tr>
                    <th>Depo Adı</th>
                    <th>Şube</th>
                    <th>Adres</th>
                    <th>Durum</th>
                    <th>İşlemler</th>
                </tr>
            </thead>
            <tbody>
                @for (i of filteredItems; track i.id) {
                <tr>
                    <td class="font-medium" style="color: var(--text-primary);">
                        <div class="cell-with-icon"><span class="material-icons-outlined">warehouse</span>{{ i.name }}
                        </div>
                    </td>
                    <td>{{ i.branchName }}</td>
                    <td class="text-muted">{{ i.address }}</td>
                    <td><span class="badge" [class.badge-success]="i.isActive" [class.badge-danger]="!i.isActive">{{
                            i.isActive ? 'Aktif' : 'Pasif' }}</span></td>
                    <td>
                        <div class="actions-cell"><button class="action-btn edit" (click)="openEditModal(i)"><span
                                    class="material-icons-outlined">edit</span></button><button
                                class="action-btn delete" (click)="deleteItem(i.id)"><span
                                    class="material-icons-outlined">delete</span></button></div>
                    </td>
                </tr>
                }
            </tbody>
        </table>
    </div>
</div>
@if (showModal()) {
<div class="overlay" (click)="closeModal()"></div>
<div class="modal" style="width: 480px;">
    <div class="modal-header">
        <h2>{{ editingItem() ? 'Depo Düzenle' : 'Yeni Depo' }}</h2><button class="modal-close"
            (click)="closeModal()"><span class="material-icons-outlined">close</span></button>
    </div>
    <div class="modal-form">
        <div class="form-group"><label class="form-label">Depo Adı</label><input class="form-input"
                [(ngModel)]="formData.name" /></div>
        <div class="form-group"><label class="form-label">Adres</label><input class="form-input"
                [(ngModel)]="formData.address" /></div>
    </div>
    <div class="modal-footer"><button class="btn btn-secondary" (click)="closeModal()">İptal</button><button
            class="btn btn-primary" (click)="save()"><span class="material-icons-outlined">save</span> Kaydet</button>
    </div>
</div>
}
